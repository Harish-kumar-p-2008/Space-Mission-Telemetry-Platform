spring:
  application:
    name: API-Gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: satellite-service
              uri: http://localhost:8081
              predicates:
                - Path=/satellites/**

            - id: telemetry-service
              uri: http://localhost:8082
              predicates:
                - Path=/telemetry/**

            - id: alert-service
              uri: http://localhost:8083
              predicates:
                - Path=/alerts/**

            - id: maintenance-service
              uri: http://localhost:8084
              predicates:
                - Path=/maintenance/**

server:
  port: 8080